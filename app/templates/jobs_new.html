{% extends "base.html" %}
{% block content %}
<section class="card">
  <h2>Ingest Job</h2>
  {% if error %}
    <p class="warn-text">{{ error }}</p>
  {% endif %}
  <form method="post" action="/jobs/ingest">
    <label>Job URL</label>
    <input type="url" name="url" value="{{ url }}" placeholder="https://..." />
    <label>Fallback: paste JD text</label>
    <textarea name="jd_text" rows="16">{{ jd_text }}</textarea>
    <button type="submit">Ingest Job</button>
  </form>
  <p class="muted">If scraping fails, paste JD text and submit again.</p>
</section>
{% endblock %}
