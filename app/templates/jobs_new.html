{% extends "base.html" %}
{% block content %}
<section class="animate-fadeup rounded-3xl border border-stone-200 bg-white/85 p-6 shadow-sm md:p-8">
  <p class="text-xs font-bold uppercase tracking-[0.2em] text-teal-700">Jobs</p>
  <h2 class="mt-2 text-3xl font-extrabold tracking-tight text-slate-900">Ingest Job</h2>
  <p class="mt-2 text-sm text-slate-700">Use a URL when possible, then paste JD text as a fallback if scraping fails.</p>

  {% if error %}
    <p class="mt-4 rounded-xl border border-rose-300 bg-rose-50 px-4 py-3 text-sm text-rose-900">{{ error }}</p>
  {% endif %}

  <form class="mt-5 space-y-4 [&_label]:mb-1 [&_label]:block [&_label]:text-xs [&_label]:font-bold [&_label]:uppercase [&_label]:tracking-wide [&_label]:text-slate-600 [&_input]:block [&_input]:w-full [&_input]:rounded-xl [&_input]:border [&_input]:border-stone-300 [&_input]:bg-white [&_input]:px-3 [&_input]:py-2 [&_input]:text-sm [&_input]:focus:border-teal-500 [&_input]:focus:outline-none [&_input]:focus:ring-2 [&_input]:focus:ring-teal-200 [&_textarea]:block [&_textarea]:w-full [&_textarea]:rounded-xl [&_textarea]:border [&_textarea]:border-stone-300 [&_textarea]:bg-white [&_textarea]:px-3 [&_textarea]:py-2 [&_textarea]:text-sm [&_textarea]:leading-6 [&_textarea]:focus:border-teal-500 [&_textarea]:focus:outline-none [&_textarea]:focus:ring-2 [&_textarea]:focus:ring-teal-200" method="post" action="/jobs/ingest">
    <div>
      <label>Job URL</label>
      <input type="url" name="url" value="{{ url }}" placeholder="https://..." />
    </div>

    <div>
      <label>Fallback: paste JD text</label>
      <textarea name="jd_text" rows="16">{{ jd_text }}</textarea>
    </div>

    <button class="inline-flex items-center justify-center rounded-xl bg-teal-700 px-5 py-2.5 text-sm font-bold text-white transition hover:bg-teal-800" type="submit">Ingest Job</button>
  </form>
</section>
{% endblock %}
