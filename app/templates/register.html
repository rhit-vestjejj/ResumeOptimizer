{% extends "base.html" %}
{% block content %}
<section class="mx-auto max-w-lg animate-fadeup overflow-hidden rounded-[1.8rem] border border-white/70 bg-white/88 p-7 shadow-[0_20px_45px_rgba(24,55,93,0.15)] backdrop-blur">
  <p class="text-xs font-bold uppercase tracking-[0.2em] text-sky-700">New Workspace</p>
  <h2 class="mt-2 font-display text-3xl font-bold text-slate-900">Create Account</h2>
  <p class="mt-2 text-sm text-slate-600">Set up your personal resume workspace in under a minute.</p>
  {% if error %}
    <p class="mt-4 rounded-lg border border-rose-300 bg-rose-50 px-3 py-2 text-sm text-rose-900">{{ error }}</p>
  {% endif %}
  <form class="mt-4" method="post" action="/auth/register">
    <input type="hidden" name="next" value="{{ next_path }}" />
    <label for="email" class="text-sm font-semibold text-slate-700">Email</label>
    <input id="email" name="email" type="email" autocomplete="email" required value="{{ email }}" />
    <label for="password" class="text-sm font-semibold text-slate-700">Password</label>
    <input id="password" name="password" type="password" autocomplete="new-password" minlength="8" required />
    <label for="confirm_password" class="text-sm font-semibold text-slate-700">Confirm Password</label>
    <input id="confirm_password" name="confirm_password" type="password" autocomplete="new-password" minlength="8" required />
    <button type="submit" class="mt-2">Create account</button>
  </form>
  <p class="mt-4 text-sm text-slate-600">
    Already have an account?
    <a href="/auth/login" class="font-semibold text-teal-800 underline">Sign in</a>
  </p>
</section>
{% endblock %}
