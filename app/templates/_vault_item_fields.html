<div class="space-y-4 [&_label]:mb-1 [&_label]:block [&_label]:text-xs [&_label]:font-bold [&_label]:uppercase [&_label]:tracking-wide [&_label]:text-slate-600 [&_input]:block [&_input]:w-full [&_input]:rounded-xl [&_input]:border [&_input]:border-stone-300 [&_input]:bg-white [&_input]:px-3 [&_input]:py-2 [&_input]:text-sm [&_input]:focus:border-teal-500 [&_input]:focus:outline-none [&_input]:focus:ring-2 [&_input]:focus:ring-teal-200 [&_textarea]:block [&_textarea]:w-full [&_textarea]:rounded-xl [&_textarea]:border [&_textarea]:border-stone-300 [&_textarea]:bg-white [&_textarea]:px-3 [&_textarea]:py-2 [&_textarea]:text-sm [&_textarea]:leading-6 [&_textarea]:focus:border-teal-500 [&_textarea]:focus:outline-none [&_textarea]:focus:ring-2 [&_textarea]:focus:ring-teal-200 [&_select]:block [&_select]:w-full [&_select]:rounded-xl [&_select]:border [&_select]:border-stone-300 [&_select]:bg-white [&_select]:px-3 [&_select]:py-2 [&_select]:text-sm [&_select]:focus:border-teal-500 [&_select]:focus:outline-none [&_select]:focus:ring-2 [&_select]:focus:ring-teal-200">
  <div class="grid gap-4 md:grid-cols-2">
    <div>
      <label>Type</label>
      <select name="type" required>
        <option value="project" {% if item_form.type == 'project' %}selected{% endif %}>project</option>
        <option value="job" {% if item_form.type == 'job' %}selected{% endif %}>job</option>
        <option value="club" {% if item_form.type == 'club' %}selected{% endif %}>club</option>
        <option value="coursework" {% if item_form.type == 'coursework' %}selected{% endif %}>coursework</option>
        <option value="award" {% if item_form.type == 'award' %}selected{% endif %}>award</option>
        <option value="skillset" {% if item_form.type == 'skillset' %}selected{% endif %}>skillset</option>
        <option value="other" {% if item_form.type == 'other' %}selected{% endif %}>other</option>
      </select>
    </div>
    <div>
      <label>Title</label>
      <input type="text" name="title" value="{{ item_form.title }}" required />
    </div>
    <div>
      <label>Start Date</label>
      <input type="text" name="start" value="{{ item_form.start }}" placeholder="Jan 2024" />
    </div>
    <div>
      <label>End Date</label>
      <input type="text" name="end" value="{{ item_form.end }}" placeholder="Present" />
    </div>
  </div>

  <div>
    <label>Tags (comma or newline separated)</label>
    <textarea name="tags_text" rows="2">{{ item_form.tags | join('\n') }}</textarea>
  </div>

  <div>
    <label>Tech (comma or newline separated)</label>
    <textarea name="tech_text" rows="3">{{ item_form.tech | join('\n') }}</textarea>
  </div>

  <div class="rounded-2xl border border-stone-200 bg-stone-50/80 p-4" data-bullet-editor>
    <div class="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
      <div>
        <h3 class="text-sm font-bold uppercase tracking-wide text-slate-700">Bullets</h3>
        <p class="text-xs text-slate-600">Capture STAR context and measurable impact when possible.</p>
      </div>
      <button class="inline-flex items-center justify-center rounded-lg border border-stone-300 bg-white px-3 py-1.5 text-xs font-semibold text-slate-800 transition hover:bg-stone-100" type="button" data-add-vault-bullet>Add Bullet</button>
    </div>

    {% set bullet_rows = item_form.bullets if item_form.bullets else [ {'text':'', 'situation':'', 'task':'', 'action':'', 'outcome':'', 'impact':''} ] %}
    <div class="mt-3 space-y-3" data-bullet-list data-prefix="bullet" data-next-index="{{ bullet_rows|length }}">
      {% for bullet in bullet_rows %}
      <div class="entry-card dynamic-row rounded-xl border border-stone-200 bg-white p-4 shadow-sm">
        <div class="mb-3 flex items-center justify-between gap-3">
          <strong class="text-sm text-slate-800">Bullet {{ loop.index }}</strong>
          <button class="inline-flex rounded-lg bg-rose-100 px-2.5 py-1 text-xs font-semibold text-rose-800 transition hover:bg-rose-200" type="button" data-remove-row>Remove</button>
        </div>

        <label>Text</label>
        <input type="text" name="bullet_{{ loop.index0 }}_text" value="{{ bullet.text }}" placeholder="Built a ... that improved ..." />

        <div class="mt-3 grid gap-3 md:grid-cols-2">
          <div>
            <label>Situation</label>
            <input type="text" name="bullet_{{ loop.index0 }}_situation" value="{{ bullet.situation }}" />
          </div>
          <div>
            <label>Task</label>
            <input type="text" name="bullet_{{ loop.index0 }}_task" value="{{ bullet.task }}" />
          </div>
          <div>
            <label>Action</label>
            <input type="text" name="bullet_{{ loop.index0 }}_action" value="{{ bullet.action }}" />
          </div>
          <div>
            <label>Outcome</label>
            <input type="text" name="bullet_{{ loop.index0 }}_outcome" value="{{ bullet.outcome }}" />
          </div>
        </div>

        <div class="mt-3">
          <label>Impact</label>
          <input type="text" name="bullet_{{ loop.index0 }}_impact" value="{{ bullet.impact }}" />
        </div>
      </div>
      {% endfor %}
    </div>
  </div>

  <div>
    <label>Links (comma or newline separated)</label>
    <textarea name="links_text" rows="2">{{ item_form.links | join('\n') }}</textarea>
  </div>

  <div>
    <label>Source Artifacts (comma or newline separated)</label>
    <textarea name="source_artifacts_text" rows="3">{{ item_form.source_artifacts | join('\n') }}</textarea>
  </div>
</div>
